<div class="w-[800px] dialog">
  <h2 class="text-2xl font-bold text-center text-white mb-6">CSV Datei importieren</h2>
  <app-csv-import (fileSelected)="onFileSelected($event)" />
  @for (transaction of transactions(); track transaction.buchung) {
    <div>{{ transaction.auftragsgeber }}</div>
  }
  <div class="mt-5 space-x-4 justify-end flex">
    <button type="button" class="btn-secondary" (click)="dialogRef.close()">Abbrechen</button>
  </div>
</div>
